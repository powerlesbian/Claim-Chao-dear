name: Keep Supabase Alive

on:
  schedule:
    - cron: '0 12 */3 * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase REST API
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            "https://fovrwhpndmrvnjdtzjxr.supabase.co/rest/v1/" \
            -H "apikey: sb_publishable_ejKf_TQLap-kdJuBe3ieZg_m7h8Htp0" \
            -H "Authorization: Bearer sb_publishable_ejKf_TQLap-kdJuBe3ieZg_m7h8Htp0")
          echo "HTTP status: $STATUS"
          if [ "$STATUS" != "200" ]; then exit 1; fi
